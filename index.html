<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KawalPay - Live Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen font-sans">

    <div class="bg-white w-96 rounded-3xl shadow-2xl overflow-hidden border-4 border-gray-800 relative">
        <div class="bg-green-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold tracking-wider">KawalPay</h1>
            <p class="text-sm opacity-80 mt-1">Transfer to: Uncle Muthu</p>
        </div>

        <div class="p-6">
            <h2 class="text-4xl font-bold text-center mb-8 text-gray-800">RM 500.00</h2>
            
            <p class="text-xs text-gray-500 mb-3 text-center">👇 Judges Demo Console 👇</p>
            
            <div class="space-y-3">
                <button onclick="sendTransfer('SAFE')" class="w-full bg-blue-100 text-blue-700 font-bold py-3 rounded-xl hover:bg-blue-200 transition border border-blue-300">
                    🟢 Scenario 1: Normal Safe Transfer
                </button>

                <button onclick="sendTransfer('SUSPICIOUS')" class="w-full bg-yellow-100 text-yellow-700 font-bold py-3 rounded-xl hover:bg-yellow-200 transition border border-yellow-300">
                    🟡 Scenario 2: Suspicious Anomaly (Dynamic Friction)
                </button>

                <button onclick="sendTransfer('ATTACK')" class="w-full bg-red-100 text-red-700 font-bold py-3 rounded-xl hover:bg-red-200 transition border border-red-300">
                    🔴 Scenario 3: Trojan/Hijack (Hard Block)
                </button>
            </div>
        </div>

        <div id="challengeModal" class="hidden absolute inset-0 bg-black bg-opacity-80 flex items-center justify-center p-4 z-50">
            <div class="bg-white rounded-2xl p-6 text-center w-full shadow-2xl transform transition-all">
                <div class="w-16 h-16 bg-yellow-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <span class="text-3xl">🛡️</span>
                </div>
                <h3 class="text-xl font-bold text-gray-800 mb-2">Security Verification</h3>
                <p class="text-gray-600 mb-6 text-sm">Unusual login environment detected. To protect your funds, please tap the <br><strong class="text-green-600 text-xl tracking-widest mt-2 inline-block">Nasi Lemak</strong></p>
                
                <div class="grid grid-cols-2 gap-4 mb-4 text-5xl">
                    <button onclick="fail()" class="bg-gray-50 p-4 rounded-xl hover:bg-red-100 transition border-2 border-transparent hover:border-red-300 active:scale-95">🍎</button>
                    <button onclick="pass()" class="bg-gray-50 p-4 rounded-xl hover:bg-green-100 transition border-2 border-transparent hover:border-green-300 active:scale-95">🍛</button> <button onclick="fail()" class="bg-gray-50 p-4 rounded-xl hover:bg-red-100 transition border-2 border-transparent hover:border-red-300 active:scale-95">🍔</button>
                    <button onclick="fail()" class="bg-gray-50 p-4 rounded-xl hover:bg-red-100 transition border-2 border-transparent hover:border-red-300 active:scale-95">🍜</button>
                </div>
                <p id="riskScoreDisplay" class="text-xs text-gray-400 font-mono mt-4"></p>
            </div>
        </div>
    </div>

    <script>
        async function sendTransfer(scenario) {
            let payload = {};
            
            // Feed different contextual features to the AI Brain based on the scenario
            if (scenario === 'SAFE') {
                payload = { amount_myr: 50.0, is_new_payee: 0, is_pasted_from_clipboard: 0, is_rooted_or_jailbroken: 0, is_active_call_ongoing: 0, dwell_time_ms: 2000.0 };
            } else if (scenario === 'SUSPICIOUS') {
                // Medium Risk: Larger amount + Pasted Account ID + Hesitation (15 seconds)
                payload = { amount_myr: 3500.0, is_new_payee: 1, is_pasted_from_clipboard: 1, is_rooted_or_jailbroken: 0, is_active_call_ongoing: 0, dwell_time_ms: 15000.0 };
            } else if (scenario === 'ATTACK') {
                // Critical Risk: Device Rooted/Hijacked + Active Call (Social Engineering)
                payload = { amount_myr: 5000.0, is_new_payee: 1, is_pasted_from_clipboard: 1, is_rooted_or_jailbroken: 1, is_active_call_ongoing: 1, dwell_time_ms: 50000.0 };
            }

            try {
                // Call our local FastAPI backend
                const response = await fetch('http://127.0.0.1:8000/api/v1/evaluate_risk', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                
                // Render UI based on AI risk assessment
                if (result.action === 'APPROVE') {
                    alert(`✅ Transfer Successful!\nAI Risk Assessment: Low (${result.risk_score_percentage}%)`);
                } else if (result.action === 'CHALLENGE') {
                    // ⭐️ Trigger the Dynamic Friction Modal!
                    document.getElementById('riskScoreDisplay').innerText = `KawalPay AI Score: ${result.risk_score_percentage}%`;
                    document.getElementById('challengeModal').classList.remove('hidden');
                } else {
                    alert(`🔴 ALERT: Transaction blocked by hardware circuit breaker!\nAI assessed critical risk (${result.risk_score_percentage}%). Account frozen for your protection.`);
                }
            } catch (error) {
                alert('Connection to API failed! Please ensure main.py is running and CORS is configured.');
            }
        }

        // Logic for passing the visual challenge
        function pass() {
            alert('✅ Verification Passed! Transfer is proceeding securely.');
            document.getElementById('challengeModal').classList.add('hidden');
        }

        // Logic for failing the visual challenge
        function fail() {
            alert('❌ Verification Failed! Operation frozen.');
            document.getElementById('challengeModal').classList.add('hidden');
        }
    </script>
</body>
</html>
